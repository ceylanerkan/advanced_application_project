<div class="page-content animate-fade-in">
  <header class="page-header"><h2>⚙️ System Settings</h2><p>Global platform configuration.</p></header>

  <div class="glass-panel" style="max-width: 600px;">
    <div class="form-group"><label>Platform Name</label><input [(ngModel)]="settings.platformName"></div>
    <div class="form-group"><label>Default Currency</label>
      <select [(ngModel)]="settings.defaultCurrency">
        <option value="USD">USD ($)</option><option value="EUR">EUR (€)</option><option value="GBP">GBP (£)</option><option value="TRY">TRY (₺)</option>
      </select>
    </div>
    <div class="form-group"><label>Max Products Per Store</label><input type="number" [(ngModel)]="settings.maxProductsPerStore"></div>
    <div class="form-group"><label>Session Timeout (minutes)</label><input type="number" [(ngModel)]="settings.sessionTimeout"></div>
    <div class="form-group" style="display:flex; align-items:center; gap:0.75rem;">
      <input type="checkbox" [(ngModel)]="settings.enableRegistration" style="width:auto;">
      <label style="margin:0">Allow User Registration</label>
    </div>
    <div class="form-group" style="display:flex; align-items:center; gap:0.75rem;">
      <input type="checkbox" [(ngModel)]="settings.maintenanceMode" style="width:auto;">
      <label style="margin:0; color: var(--danger);">Maintenance Mode</label>
    </div>
    <button class="btn btn-primary" (click)="save()" style="margin-top:1rem;">Save Settings</button>
  </div>
</div>
