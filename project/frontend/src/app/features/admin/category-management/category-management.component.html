<div class="page-content animate-fade-in">
  <header class="page-header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div><h2>📁 Category Management</h2><p>Manage product categories and taxonomy.</p></div>
      <button class="btn btn-primary" (click)="openCreate()">+ Add Category</button>
    </div>
  </header>

  <div class="glass-panel data-table-wrapper">
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Parent</th><th>Products</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let c of categories">
          <td>{{ c.id }}</td>
          <td><strong>{{ c.name }}</strong></td>
          <td>{{ getParentName(c.parentId) }}</td>
          <td>{{ c.productCount }}</td>
          <td>
            <button class="action-btn" (click)="openEdit(c)">✏️</button>
            <button class="action-btn danger" (click)="deleteCategory(c.id)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
    <div class="glass-panel modal-content" (click)="$event.stopPropagation()">
      <h3>{{ editMode ? 'Edit Category' : 'Add Category' }}</h3>
      <div class="form-group"><label>Name</label><input [(ngModel)]="current.name" placeholder="Category name"></div>
      <div class="form-group"><label>Parent Category</label>
        <select [(ngModel)]="current.parentId">
          <option [ngValue]="null">None (Root category)</option>
          <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
        </select>
      </div>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn btn-primary" (click)="save()">{{ editMode ? 'Update' : 'Create' }}</button>
        <button class="btn btn-outline" (click)="showModal = false">Cancel</button>
      </div>
    </div>
  </div>
</div>
